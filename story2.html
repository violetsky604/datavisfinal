<div id="chart"></div>

<div id="plot-toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">Chart</span>
    <button type="button" class="btn-chart-action" onclick="zoomOut()">－ Zoom Out</button>
    <button type="button" class="btn-chart-action" onclick="zoomIn()">Zoom In</button>
    <button type="button" class="btn-chart-action" onclick="downloadPng()">↓ Download PNG</button>
  </div>
</div>

<script>
const plotlyConfig = {
  responsive: true,
  displayModeBar: false,
  displaylogo: false,
};

function storeRange() {
  const layout = document.getElementById('chart').layout;
  defaultRange = {
    x: [...layout.xaxis.range],
    y: [...layout.yaxis.range]
  };
  zoomedOut = false;
}
let defaultRange = null;
let zoomedOut = false;

function zoomOut() {
  if (!defaultRange) return;
  const xPad = (defaultRange.x[1] - defaultRange.x[0]) * 0.4;
  const yPad = (defaultRange.y[1] - defaultRange.y[0]) * 0.4;
  Plotly.relayout('chart', {
    'xaxis.range': [defaultRange.x[0] - xPad, defaultRange.x[1] + xPad],
    'yaxis.range': [defaultRange.y[0] - yPad, defaultRange.y[1] + yPad]
  });
  zoomedOut = true;
}

function zoomIn() {
  if (!defaultRange) return;
  Plotly.relayout('chart', {
    'xaxis.range': defaultRange.x,
    'yaxis.range': defaultRange.y
  });
  zoomedOut = false;
}

function downloadPng() {
  Plotly.downloadImage("chart", { format: "png", filename: "views-vs-engagement" });
}

fetch("json/story2_data.json")
  .then(r => r.json())
  .then(json => {
    const data = json.data;
    const avgLine = json.avg_engagement_mean;

    const trace = {
      type: "scatter",
      mode: "markers+text",
      x: data.map(d => d.total_views_b),
      y: data.map(d => d.avg_engagement_pct),
      text: data.map(d => d.category),
      customdata: data.map(d => d.num_videos),
      textposition: "top center",
      textfont: { size: 13, color: "#374151" },
      marker: {
        size: data.map(d => d.bubble_size),
        color: data.map(d => d.color),
        opacity: 0.85,
        line: { width: 1.5, color: "white" },
      },
      hovertemplate:
        "<b>%{text}</b><br>" +
        "Total Views: %{x:.2f}B<br>" +
        "Avg Engagement Rate: %{y:.2f}%<br>" +
        "<extra></extra>",
    };

    const layout = {
      dragmode: false,
      title: {
        text: "<b>The View Gap: Volume vs Engagement by Category</b><br>" +
              "<sup>Bubble size = number of trending videos | High engagement ≠ high views</sup>",
        font: { family: "Inter, sans-serif", size: 24, color: "#1e1b4b" },
        x: 0.05,
        pad: { t: 20 },
      },
      xaxis: {
        title: {
          text: "Total Views (Billions)",
          font: { size: 14 },
        },
        gridcolor: "#f3f4f6",
        tickfont: { size: 13 },
        zeroline: false,
      },
      yaxis: {
        title: {
          text: "Avg Engagement Rate (likes/views %)",
          font: { size: 14 },
        },
        gridcolor: "#f3f4f6",
        tickfont: { size: 13 },
        ticksuffix: "%",
        zeroline: false,
      },
      shapes: [{
        type: "line",
        x0: 0, x1: 1, xref: "paper",
        y0: avgLine, y1: avgLine,
        line: { dash: "dot", color: "#9CA3AF", width: 1.5 },
      }],
      annotations: [{
        x: 1, xref: "paper",
        y: avgLine,
        text: "Avg engagement",
        showarrow: false,
        xanchor: "left",
        font: { size: 10, color: "#9CA3AF" },
      }],
      plot_bgcolor: "white",
      paper_bgcolor: "white",
      height: 900,
      showlegend: false,
      margin: { l: 100, r: 120, t: 180, b: 80 },
      font: { family: "Inter, sans-serif", color: "#374151" },
      hoverlabel: { bgcolor: "white", font: { size: 13 } },
    };

    return Plotly.newPlot("chart", [trace], layout, plotlyConfig);
  })
  .then(() => {
    storeRange();
  });
</script>
