    }

    .btn-chart-action {

    .page-shell {

  </style>

</head>

<body>

<div class="page-shell">

<a href="index.html" style="position:fixed;top:16px;
left:16px;padding:6px 14px;font-size:13px;font-family:Inter,sans-serif;
background:#F5F3FF;border:1px solid #7C3AED;color:#374151;border-radius:4px;
cursor:pointer;text-decoration:none;z-index:999;">← Back</a>



<main class="story-main">

<div id="chart"></div>



<div id="plot-toolbar">

  <div class="toolbar-group">

    <span class="toolbar-label">Sort by</span>

    <button type="button" class="btn-sort-dislikes active" onclick="sortBy('dislike')">↑ Dislikes</button>

    <button type="button" class="btn-sort-likes" onclick="sortBy('like')">↑ Likes</button>

    <button type="button" class="btn-outlier" onclick="toggleOutlier(this)">⚠ Hide Outlier</button>

  </div>

  <div class="toolbar-divider" aria-hidden="true"></div>

  <div class="toolbar-group">

    <span class="toolbar-label">Chart</span>

    <button type="button" class="btn-chart-action" onclick="zoomOut()">－ Zoom Out</button>

    <button type="button" class="btn-chart-action" onclick="zoomIn()">Zoom In</button>

    <button type="button" class="btn-chart-action" onclick="chartDownloadPng()">↓ Download PNG</button>

  </div>

</div>

</main>



<div style="margin:40px auto 100px auto;max-width:800px;">
  <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;
  color:#9ca3af;margin-bottom:12px;text-align:center;display:block;">More Stories</p>
  <div style="display:flex;justify-content:center;gap:40px;">
    <a href="story2.html" style="text-decoration:none;background:#f9fafb;
    border:1px solid #e5e7eb;border-radius:8px;width:220px;overflow:hidden;
    display:block;">
      <div style="height:80px;display:flex;align-items:center;
      justify-content:center;"><svg viewBox="0 0 24 24" aria-hidden="true" style="width:48px;height:48px;color:#4fc3f7;flex-shrink:0;"><path fill="currentColor" d="M4 20h4V10H4v10zm6 0h4V4h-4v16zm6 0h4v-8h-4v8z"/></svg></div>
      <div style="padding:8px 12px;font-size:14px;font-weight:600;
      color:#374151;">Views vs Engagement</div>
      <div style="padding:0 12px 10px;font-size:12px;color:#9ca3af;">
      Does reach equal reaction?</div>
    </a>
    <a href="story3.html" style="text-decoration:none;background:#f9fafb;
    border:1px solid #e5e7eb;border-radius:8px;width:220px;overflow:hidden;
    display:block;">
      <div style="height:80px;display:flex;align-items:center;
      justify-content:center;"><svg viewBox="0 0 24 24" aria-hidden="true" style="width:48px;height:48px;color:#81c784;flex-shrink:0;"><path fill="currentColor" d="M13 2L3 14h7l-1 8 11-12h-7l1-8z"/></svg></div>
      <div style="padding:8px 12px;font-size:14px;font-weight:600;
      color:#374151;">Publish → Trending Delay</div>
      <div style="padding:0 12px 10px;font-size:12px;color:#9ca3af;">
      How fast do videos hit trending?</div>
    </a>
    <a href="story4.html" style="text-decoration:none;background:#f9fafb;
    border:1px solid #e5e7eb;border-radius:8px;width:220px;overflow:hidden;
    display:block;">
      <div style="height:80px;display:flex;align-items:center;
      justify-content:center;"><svg viewBox="0 0 24 24" aria-hidden="true" style="width:48px;height:48px;color:#ffb74d;flex-shrink:0;"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M8 3v3M16 3v3M6 8h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V10a2 2 0 012-2zM4 14h16"/></svg></div>
      <div style="padding:8px 12px;font-size:14px;font-weight:600;

  </div>
</div>

</div>

<script>

const plotlyConfig = {

  responsive: true,

  displayModeBar: false,

  displaylogo: false,

};



const OUTLIER = "Nonprofits & Activism";

let allData = [];

let hideOutlier = false;

let currentSort = "dislike";



function storeRange() {
  const layout = document.getElementById('chart').layout;
  defaultRange = {
    x: [...layout.xaxis.range],
    y: [...layout.yaxis.range]
  };
  zoomedOut = false;
}
let defaultRange = null;
let zoomedOut = false;

function zoomOut() {
  if (!defaultRange) return;
  const xPad = (defaultRange.x[1] - defaultRange.x[0]) * 0.4;
  const yPad = (defaultRange.y[1] - defaultRange.y[0]) * 0.4;
  Plotly.relayout('chart', {
    'xaxis.range': [defaultRange.x[0] - xPad, defaultRange.x[1] + xPad],
    'yaxis.range': [defaultRange.y[0] - yPad, defaultRange.y[1] + yPad]
  });
  zoomedOut = true;
}

function zoomIn() {
  if (!defaultRange) return;
  Plotly.relayout('chart', {
    'xaxis.range': defaultRange.x,
    'yaxis.range': defaultRange.y
  });
  zoomedOut = false;
}

fetch("json/story1_data.json")

  .then(r => r.json())

  .then(data => {

    allData = data;

    renderChart();

  });



function getDisplayData() {

  let data = hideOutlier ? allData.filter(d => d.category !== OUTLIER) : allData;

  if (currentSort === "dislike") {

    data = [...data].sort((a, b) => a.dislike_rate - b.dislike_rate);

  } else {

    data = [...data].sort((a, b) => a.like_rate - b.like_rate);

  }

  return data;

}



function chartDownloadPng() {

  Plotly.downloadImage("chart", { format: "png", filename: "engagement-by-category" });

}



function renderChart() {

  const data = getDisplayData();

  const categories = data.map(d => d.category);

  const likeRates  = data.map(d => d.like_rate);

  const disRates   = data.map(d => d.dislike_rate);

  const likesTrace = {

    type: "bar",

    orientation: "h",

    name: "Like Rate",

    y: categories,

    x: likeRates,

    marker: {

      color: "#93C5FD",

      line: { color: "#2563EB", width: 1.5 },

    },

    hovertemplate: "<b>%{y}</b><br>Like rate: %{x:.2f}%<extra></extra>",

  };



  const dislikesTrace = {

    type: "bar",

    orientation: "h",

    name: "Dislike Rate",

    y: categories,

    x: disRates.map(v => -v),

    customdata: disRates,

    marker: {

      color: "#FCA5A5",

      line: { color: "#DC2626", width: 1.5 },

    },

    hovertemplate: "<b>%{y}</b><br>Dislike rate: %{customdata:.2f}%<extra></extra>",

  };



  const annotations = [];

  if (!hideOutlier) {

    annotations.push({

      x: -0.02,

      y: OUTLIER,

      text: "⚠ Small sample (74 videos)",

      showarrow: false,

      font: { size: 10, color: "#D97706", weight: "bold" },

      xanchor: "right",

    });

  }



  const layout = {

    barmode: "overlay",

    title: {

      text: "<b>What Gets Canada Clicking Dislike?</b><br><sup>Like vs dislike rate as % of views</sup>",

      font: { family: "Inter, sans-serif", size: 26, color: "#1e1b4b" },

      x: 0.05,

      y: 0.95,

      pad: { t: 20 },

    },

    xaxis: {

      title: { text: "% of Views", font: { size: 13 } },

      ticksuffix: "%",

      autorange: true,

      gridcolor: "#f3f4f6",

      tickfont: { size: 12 },

      zeroline: true,

      zerolinecolor: "#374151",

      zerolinewidth: 1.5,

    },

    yaxis: { title: "", tickfont: { size: 13 } },

    legend: { orientation: "h", yanchor: "bottom", y: 1.08, xanchor: "left", x: 0, font: { size: 13 } },

    plot_bgcolor: "white",

    paper_bgcolor: "white",

    height: 700,

    margin: { l: 220, r: 100, t: 180, b: 80 },

    font: { family: "Inter, sans-serif", color: "#374151" },

    hoverlabel: { bgcolor: "white", font: { size: 13 } },

    annotations: annotations,

  };



  Plotly.react("chart", [likesTrace, dislikesTrace], layout, plotlyConfig).then(() => storeRange());

}



function sortBy(field) {

  currentSort = field;

  document.querySelectorAll(".btn-sort-dislikes, .btn-sort-likes").forEach(b => b.classList.remove("active"));

  if (field === "dislike") {

    document.querySelector(".btn-sort-dislikes").classList.add("active");

  } else {

    document.querySelector(".btn-sort-likes").classList.add("active");

  }

  renderChart();

}



function toggleOutlier(btn) {

  hideOutlier = !hideOutlier;

  btn.classList.toggle("active");

  btn.textContent = hideOutlier ? "⚠ Show Outlier" : "⚠ Hide Outlier";

  renderChart();

}

</script>

</body>
