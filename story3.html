<div id="chart"></div>

<div id="plot-toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">Chart</span>
    <button type="button" class="btn-chart-action" onclick="zoomOut()">－ Zoom Out</button>
    <button type="button" class="btn-chart-action" onclick="zoomIn()">Zoom In</button>
    <button type="button" class="btn-chart-action" onclick="downloadPng()">↓ Download PNG</button>
  </div>
</div>

<script>
const plotlyConfig = {
  responsive: true,
  displayModeBar: false,
  displaylogo: false,
};

function storeRange() {
  const layout = document.getElementById('chart').layout;
  defaultRange = {
    x: [...layout.xaxis.range],
    y: [...layout.yaxis.range]
  };
  zoomedOut = false;
}
let defaultRange = null;
let zoomedOut = false;

function zoomOut() {
  if (!defaultRange) return;
  const xPad = (defaultRange.x[1] - defaultRange.x[0]) * 0.4;
  const yPad = (defaultRange.y[1] - defaultRange.y[0]) * 0.4;
  Plotly.relayout('chart', {
    'xaxis.range': [defaultRange.x[0] - xPad, defaultRange.x[1] + xPad],
    'yaxis.range': [defaultRange.y[0] - yPad, defaultRange.y[1] + yPad]
  });
  zoomedOut = true;
}

function zoomIn() {
  if (!defaultRange) return;
  Plotly.relayout('chart', {
    'xaxis.range': defaultRange.x,
    'yaxis.range': defaultRange.y
  });
  zoomedOut = false;
}

function downloadPng() {
  Plotly.downloadImage("chart", { format: "png", filename: "publish-trending-delay" });
}

fetch("json/story3_data.json")
  .then(r => r.json())
  .then(data => {
    const x = data.map(d => d.days_to_trend);
    const y = data.map(d => d.median_views);
    const counts = data.map(d => d.count);

    const trace = {
      type: "scatter",
      mode: "lines+markers",
      fill: "tozeroy",
      x: x,
      y: y,
      customdata: counts,
      line: { color: "#C2410C", width: 3, shape: "linear" },
      marker: { size: 10, color: "#C2410C", opacity: 0.9 },
      fillcolor: "rgba(251, 146, 60, 0.3)",
      hovertemplate: "<b>Day %{x}</b><br>Median views: %{y:,}<br>Videos: %{customdata}<extra></extra>",
    };

    const layout = {
      dragmode: false,
      title: {
        text: "<b>What It Takes to Trend in Canada</b><br><sup>Median views by days between publishing and trending, 2017–2018</sup>",
        font: { family: "Inter, sans-serif", size: 24, color: "#1e1b4b" },
        x: 0.05,
        pad: { t: 20 },
      },
      xaxis: {
        title: {
          text: "Days Between Publishing and Trending",
          font: { size: 14 },
        },
        dtick: 1,
        gridcolor: "#f3f4f6",
        tickfont: { size: 13 },
      },
      yaxis: {
        title: {
          text: "Median Views",
          font: { size: 14 },
        },
        tickformat: ".2s",
        gridcolor: "#f3f4f6",
        tickfont: { size: 13 },
      },
      annotations: [
        {
          x: 4,
          y: data.find(d => d.days_to_trend === 4)?.median_views || 0,
          text: "n=571 videos",
          showarrow: true, arrowhead: 2, arrowcolor: "#374151",
          font: { size: 11, color: "#374151", family: "Inter, sans-serif" },
          ax: -50, ay: -40,
        },
        {
          x: 5,
          y: data.find(d => d.days_to_trend === 5)?.median_views || 0,
          text: "n=148 videos",
          showarrow: true, arrowhead: 2, arrowcolor: "#374151",
          font: { size: 11, color: "#374151", family: "Inter, sans-serif" },
          ax: 50, ay: -40,
        },
        {
          x: 18,
          y: data.find(d => d.days_to_trend === 18)?.median_views || 0,
          text: "n=2 videos<br>Top: 17 Awesome Crafting Life Hacks<br>(MR.ROMEO, 7.3M views)",
          showarrow: true, arrowhead: 2, arrowcolor: "#374151",
          font: { size: 10, color: "#374151", family: "Inter, sans-serif" },
          ax: 80, ay: -60,
          align: "left",
        },
        {
          x: 22,
          y: data.find(d => d.days_to_trend === 22)?.median_views || 0,
          text: "n=1 video<br>3 Simple Tricks<br>(HawkGuruHacker, 11.7M views)",
          showarrow: true, arrowhead: 2, arrowcolor: "#374151",
          font: { size: 10, color: "#374151", family: "Inter, sans-serif" },
          ax: 60, ay: -60,
          align: "left",
        },
        {
          x: 27,
          y: data.find(d => d.days_to_trend === 27)?.median_views || 0,
          text: "n=1 video<br>Gunna - Sold Out Dates ft. Lil Baby<br>(Gunna, 5M views)",
          showarrow: true, arrowhead: 2, arrowcolor: "#374151",
          font: { size: 10, color: "#374151", family: "Inter, sans-serif" },
          ax: -80, ay: -60,
          align: "left",
        },
      ],
      plot_bgcolor: "white",
      paper_bgcolor: "white",
      height: 650,
      margin: { l: 100, r: 100, t: 180, b: 80 },
      font: { family: "Inter, sans-serif", color: "#374151" },
      hoverlabel: { bgcolor: "white", font: { size: 13 } },
    };

    return Plotly.newPlot("chart", [trace], layout, plotlyConfig);
  })
  .then(() => {
    storeRange();
  });
</script>
